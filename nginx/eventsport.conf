# EventSport — tek giriş (yalnızca bu :80 dışarı açıktır).
# backend/frontend container'ları host'a port açmaz; nginx onlara
# docker ağı üzerinden servis adıyla ulaşır.
# Docker DNS (127.0.0.11) + değişken upstream: container yeniden
# oluşturulunca eski IP'ye takılıp 502 vermez.

server {
    listen 80;
    server_name _;

    # Yüklemeler (multer) için gövde limiti
    client_max_body_size 25m;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # --- Socket.io (WebSocket) ---
    # /api/ bloğundan önce gelmeli: WebSocket upgrade başlıklarıyla backend'e proxy.
    location /socket.io/ {
        set $socket_upstream http://backend:3000;
        proxy_pass $socket_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- Backend API ---
    location /api/ {
        set $backend_upstream http://backend:3000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Yüklenen dosyalar (backend statik olarak servis eder) ---
    location /uploads/ {
        set $uploads_upstream http://backend:3000;
        proxy_pass $uploads_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Frontend (Next.js) ---
    location / {
        set $frontend_upstream http://frontend:3001;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
